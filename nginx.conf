# ============================================================
# Nginx Reverse Proxy for Talebook
# Purpose: Buffer large file responses from Tornado to handle
#          slow client connections over limited upload bandwidth.
# ============================================================

worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # ── Performance Tunables ──────────────────────────────────
    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout  65;

    # ── Gzip Compression ─────────────────────────────────────
    gzip  on;
    gzip_comp_level 5;
    gzip_types text/plain text/css application/json application/javascript
               text/xml application/xml application/xml+rss text/javascript
               application/xhtml+xml image/svg+xml;
    gzip_min_length 1024;
    gzip_vary on;

    # ── Temp file settings for large buffered responses ──────
    #    Nginx stores buffered content here when it exceeds
    #    in-memory buffer limits.
    proxy_temp_path /tmp/nginx_proxy_temp;

    server {
        listen 80;
        server_name _;

        # Allow unlimited upload size (matches Talebook's config)
        client_max_body_size 0;

        # ── Proxy Buffering (the core fix) ───────────────────
        #    Nginx fully buffers Tornado's response before
        #    streaming to the client, freeing Tornado's event
        #    loop from slow downstream connections.
        proxy_buffering       on;
        proxy_buffer_size     16k;
        proxy_buffers         64 16k;
        proxy_busy_buffers_size 64k;
        proxy_max_temp_file_size 2048m;

        # ── Timeouts ─────────────────────────────────────────
        proxy_connect_timeout 10s;
        proxy_send_timeout    300s;
        proxy_read_timeout    300s;
        send_timeout          300s;

        # ── Book file downloads (/api/book/{id}.{fmt}) ───────
        #    These are the large files (PDF/EPUB) that benefit
        #    most from buffering. Explicit Accept-Ranges header
        #    enables chunked loading in PDF.js and browsers.
        location ~ ^/api/book/[0-9]+\..+ {
            proxy_pass         http://talebook:80;
            proxy_redirect     off;
            proxy_set_header   Host $http_host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;

            # Force large buffering for file downloads
            proxy_buffering         on;
            proxy_buffer_size       32k;
            proxy_buffers           128 32k;
            proxy_busy_buffers_size 128k;
            proxy_max_temp_file_size 4096m;

            # Enable range requests for chunked/resume downloads
            add_header Accept-Ranges bytes always;
            proxy_force_ranges on;
        }

        # ── EPUB Reader extracts (/get/extract/) ─────────────
        #    Also benefits from buffering since the EPUB reader
        #    fetches many small chunks from Tornado.
        location ~ ^/get/extract/ {
            proxy_pass         http://talebook:80;
            proxy_redirect     off;
            proxy_set_header   Host $http_host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;

            proxy_buffering    on;
            add_header Accept-Ranges bytes always;
        }

        # ── Static assets (covers, thumbs, CSS/JS) ──────────
        #    Long-lived cache for covers and thumbnails.
        location ~ ^/get/ {
            proxy_pass         http://talebook:80;
            proxy_redirect     off;
            proxy_set_header   Host $http_host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;

            proxy_buffering    on;
            expires            max;
            add_header Cache-Control "public, max-age=31536000, immutable";
        }

        # ── Default: proxy everything else to Talebook ───────
        location / {
            proxy_pass         http://talebook:80;
            proxy_redirect     off;
            proxy_set_header   Host $http_host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;

            # WebSocket support (for SSR hot-reload if needed)
            proxy_http_version 1.1;
            proxy_set_header   Upgrade $http_upgrade;
            proxy_set_header   Connection "upgrade";
        }
    }
}
